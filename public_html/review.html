<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Route Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #f8fafc;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --border-color: #e2e8f0;
            --input-bg: white;
            --button-bg: #eef2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 40px 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-home {
            background: var(--button-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .btn-home:hover { background: #2c7da0; color: white; }
        .poi-info {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .poi-name { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .poi-type { display: inline-block; background: var(--button-bg); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: #2c7da0; margin-bottom: 12px; }
        .poi-description { color: var(--text-secondary); line-height: 1.5; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .poi-rating { color: #fbbf24; font-size: 1rem; margin-top: 8px; }
        .review-section {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .review-section h3 { font-size: 1.2rem; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .review-form { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .review-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .rating-select { 
            margin: 16px 0;
        }
        .radio {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .radio > input {
            position: absolute;
            appearance: none;
            opacity: 0;
            pointer-events: none;
        }
        .radio > label {
            cursor: pointer;
            font-size: 24px;
            position: relative;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .radio > label > svg {
            fill: #666;
            transition: fill 0.3s ease, filter 0.3s ease;
        }
        .radio > label:hover,
        .radio > label.is-hovered,
        .radio > label.is-active {
            transform: scale(1.2);
        }
        .radio > label.is-hovered > svg,
        .radio > label.is-active > svg {
            fill: #ff9e0b;
            filter: drop-shadow(0 0 15px rgba(255, 158, 11, 0.9));
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        @keyframes shimmer {
            0% { filter: drop-shadow(0 0 10px rgba(255, 158, 11, 0.5)); }
            100% { filter: drop-shadow(0 0 20px rgba(255, 158, 11, 1)); }
        }
        
        .submit-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .submit-btn:hover:not(:disabled) { background: #1f5e7c; transform: translateY(-2px); }
        .submit-btn.disabled, .submit-btn:disabled {
            background: #dc2626;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .reviews-list { margin-top: 20px; }
        .review-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .review-author { font-weight: 600; color: var(--text-primary); }
        .review-rating { color: #fbbf24; font-size: 1rem; letter-spacing: 2px; }
        .review-date { font-size: 0.7rem; color: var(--text-muted); }
        .review-text { color: var(--text-secondary); line-height: 1.4; margin-top: 8px; }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .empty-reviews { text-align: center; padding: 40px; color: var(--text-muted); }
        .already-reviewed-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="btn-home" id="backHomeBtn"><i class="fas fa-home"></i> Back to Map</button>
        </div>

        <div id="poiInfo" class="poi-info">
            <div class="poi-name" id="poiName">Loading...</div>
            <span class="poi-type" id="poiType"></span>
            <div class="poi-rating" id="poiRating"></div>
            <div class="poi-description" id="poiDescription"></div>
        </div>

        <div class="review-section" id="reviewSection">
            <h3><i class="fas fa-pen"></i> Write a Review</h3>
            <div id="alreadyReviewedWarning" class="already-reviewed-badge" style="display: none;">
                <i class="fas fa-info-circle"></i> You've already reviewed this place
            </div>
            <div class="review-form" id="reviewForm">
                <textarea id="reviewText" placeholder="Share your experience at this place..."></textarea>
                <div class="rating-select">
                    <div class="radio" id="ratingSelect">
                        <input value="1" name="rating" type="radio" id="rating-1" />
                        <label title="1 stars" for="rating-1" data-value="1"><svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path></svg></label>
                        <input value="2" name="rating" type="radio" id="rating-2" />
                        <label title="2 stars" for="rating-2" data-value="2"><svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path></svg></label>
                        <input value="3" name="rating" type="radio" id="rating-3" />
                        <label title="3 stars" for="rating-3" data-value="3"><svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path></svg></label>
                        <input value="4" name="rating" type="radio" id="rating-4" />
                        <label title="4 stars" for="rating-4" data-value="4"><svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path></svg></label>
                        <input value="5" name="rating" type="radio" id="rating-5" />
                        <label title="5 stars" for="rating-5" data-value="5"><svg xmlns="http://www.w3.org/2000/svg" height="1em" viewBox="0 0 576 512"><path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"></path></svg></label>
                    </div>
                </div>
                <button class="submit-btn" id="submitReviewBtn"><i class="fas fa-check"></i> Post Review</button>
            </div>
        </div>

        <div class="review-section">
            <h3><i class="fas fa-comments"></i> All Reviews</h3>
            <div id="reviewsList" class="reviews-list"></div>
        </div>
    </div>

    <script>
        // SIMPLE STANDALONE SCRIPT - NO DEPENDENCIES
        // This makes the stars work even if backend fails
        
        const VENDORS_API_URL = 'http://localhost:8000/vendors/';
        const ACCESS_TOKEN_KEY = 'routeplanner_access_token';
        const TOKEN_TYPE_KEY = 'routeplanner_token_type';

        function getAuthHeader() {
            const token = localStorage.getItem(ACCESS_TOKEN_KEY);
            if (!token) return null;
            const type = (localStorage.getItem(TOKEN_TYPE_KEY) || 'bearer').trim();
            return type.charAt(0).toUpperCase() + type.slice(1) + ' ' + token;
        }

        let selectedRating = 0;
        let userHasReviewed = false;
        let currentPOI = null;
        
        function renderRatingPreview(value) {
            const labels = document.querySelectorAll('#ratingSelect label');
            labels.forEach(label => {
                const labelValue = parseInt(label.getAttribute('data-value'), 10);
                label.classList.toggle('is-active', labelValue <= value);
                label.classList.remove('is-hovered');
            });
        }
        function renderRatingHover(value) {
            const labels = document.querySelectorAll('#ratingSelect label');
            labels.forEach(label => {
                const labelValue = parseInt(label.getAttribute('data-value'), 10);
                label.classList.toggle('is-hovered', labelValue <= value);
                label.classList.toggle('is-active', labelValue <= selectedRating);
            });
        }
        function initStars() {
            const inputs = document.querySelectorAll('#ratingSelect input[name="rating"]');
            const labels = document.querySelectorAll('#ratingSelect label');
            const ratingSelect = document.getElementById('ratingSelect');
            inputs.forEach(input => {
                input.addEventListener('change', function() {
                    if (userHasReviewed) {
                        alert('You have already reviewed this place!');
                        this.checked = false;
                        return;
                    }
                    selectedRating = parseInt(this.value, 10);
                    renderRatingPreview(selectedRating);
                });
            });
            labels.forEach(label => {
                label.addEventListener('mouseenter', () => {
                    renderRatingHover(parseInt(label.getAttribute('data-value'), 10));
                });
                label.addEventListener('click', e => {
                    if (userHasReviewed) {
                        e.preventDefault();
                    }
                });
            });
            ratingSelect.addEventListener('mouseleave', () => {
                renderRatingPreview(selectedRating);
            });
            renderRatingPreview(selectedRating);
        }
        function getPOIIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function buildFallbackPOI(poiId) {
            return {
                id: poiId || '1',
                name: 'Unnamed vendor',
                type: 'vendor',
                rating: 0,
                description: 'This is a test location. Stars should work!',
                reviews: []
            };
        }

        function getPOIFromLocalStorage(poiId) {
            const savedPOIs = localStorage.getItem('pois');
            if (savedPOIs && poiId) {
                const pois = JSON.parse(savedPOIs);
                const poi = pois.find(p => p.id == poiId);
                if (poi) {
                    return {
                        ...poi,
                        type: poi.type || 'vendor',
                        description: poi.description || '',
                        rating: typeof poi.rating === 'number' ? poi.rating : 0,
                        reviews: poi.reviews || []
                    };
                }
            }

            return null;
        }

        async function getPOIFromURL() {
            const poiId = getPOIIdFromURL();
            const localPOI = getPOIFromLocalStorage(poiId);

            // Fetch reviews from API for any valid poiId
            let reviews = [];
            if (poiId) {
                try {
                    const ratingsResp = await fetch(`${VENDORS_API_URL}${encodeURIComponent(poiId)}/ratings`);
                    if (ratingsResp.ok) {
                        reviews = await ratingsResp.json();
                    }
                } catch (e) {
                    console.warn('Could not load reviews from API.', e);
                }
            }

            if (localPOI) {
                localPOI.reviews = reviews;
                return localPOI;
            }

            if (!poiId) {
                return buildFallbackPOI();
            }

            try {
                const response = await fetch(`${VENDORS_API_URL}${encodeURIComponent(poiId)}`);
                if (!response.ok) {
                    throw new Error(`Failed to load vendor: ${response.status}`);
                }

                const vendor = await response.json();
                return {
                    id: String(vendor.id),
                    name: vendor.name || 'Unnamed vendor',
                    type: 'vendor',
                    rating: typeof vendor.rating === 'number' ? vendor.rating : 0,
                    description: vendor.description || '',
                    reviews: reviews
                };
            } catch (error) {
                console.warn('Could not load vendor details for review page.', error);
                return buildFallbackPOI(poiId);
            }
        }
        
        function displayPOIInfo(poi) {
            document.getElementById('poiName').textContent = poi.name || 'Unnamed vendor';
            document.getElementById('poiType').textContent = poi.type || 'place';
            document.getElementById('poiRating').innerHTML = poi.rating > 0
                ? `<i class="fas fa-star"></i> ${poi.rating.toFixed(1)} / 5`
                : '<i class="fas fa-star"></i> No ratings yet';
            document.getElementById('poiDescription').innerHTML = `<i class="fas fa-info-circle"></i> ${poi.description || 'No description available.'}`;
        }
        
        function displayReviews(poi) {
            const reviewsList = document.getElementById('reviewsList');
            if (!poi.reviews || poi.reviews.length === 0) {
                reviewsList.innerHTML = '<div class="empty-reviews"><i class="fas fa-comment-slash"></i><br>No reviews yet. Be the first to review!</div>';
                return;
            }
            
            reviewsList.innerHTML = '';
            poi.reviews.forEach(review => {
                const rating = Math.round(review.rating || 0);
                const starsDisplay = '★'.repeat(rating) + '☆'.repeat(5 - rating);
                const author = review.user_name || review.author || ('User #' + (review.user_id || '?'));
                const text = review.description || review.text || '';
                const date = review.created_at
                    ? new Date(review.created_at).toLocaleDateString()
                    : (review.date || '');
                reviewsList.innerHTML += `
                    <div class="review-card">
                        <div class="review-header">
                            <span class="review-author"><i class="fas fa-user"></i> ${escapeHtml(author)}</span>
                            <span class="review-rating">${starsDisplay}</span>
                            <span class="review-date">${escapeHtml(date)}</span>
                        </div>
                        <div class="review-text">${escapeHtml(text)}</div>
                    </div>
                `;
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showMessage(text, type) {
            const container = document.querySelector('.container');
            const existingMsg = document.querySelector('.message');
            if (existingMsg) existingMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `${type === 'success' ? '✓' : '⚠'} ${text}`;
            container.insertBefore(msgDiv, container.firstChild);
            setTimeout(() => msgDiv.remove(), 3000);
        }
        
        async function saveReview() {
            if (userHasReviewed) {
                showMessage('You have already reviewed this place!', 'error');
                return;
            }
            
            const reviewText = document.getElementById('reviewText').value.trim();
            
            if (!reviewText) {
                showMessage('Please write a review before submitting!', 'error');
                return;
            }
            
            if (selectedRating === 0) {
                showMessage('Please select a rating (1-5 stars)!', 'error');
                return;
            }

            const authHeader = getAuthHeader();
            if (!authHeader) {
                showMessage('You must be logged in to submit a review!', 'error');
                return;
            }

            const poiId = getPOIIdFromURL();
            const payload = {
                vendor_id: parseInt(poiId, 10),
                rating: selectedRating,
                description: reviewText
            };

            try {
                const response = await fetch(VENDORS_API_URL + 'rating', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': authHeader
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.detail || 'Failed to submit review');
                }

                showMessage('Review posted successfully!', 'success');
                document.getElementById('reviewText').value = '';
                selectedRating = 0;
                const inputs = document.querySelectorAll('#ratingSelect input[name="rating"]');
                inputs.forEach(input => { input.checked = false; });
                renderRatingPreview(0);

                // Re-fetch reviews from API
                try {
                    const ratingsResp = await fetch(`${VENDORS_API_URL}${encodeURIComponent(poiId)}/ratings`);
                    if (ratingsResp.ok) {
                        currentPOI.reviews = await ratingsResp.json();
                    }
                } catch (e) {
                    console.warn('Could not reload reviews.', e);
                }
                displayReviews(currentPOI);

                userHasReviewed = true;
                const warningDiv = document.getElementById('alreadyReviewedWarning');
                if (warningDiv) warningDiv.style.display = 'flex';
            } catch (error) {
                showMessage(error.message, 'error');
            }
        }
        
        // Initialize page
        async function init() {
            const poi = await getPOIFromURL();
            currentPOI = poi;
            displayPOIInfo(currentPOI);
            displayReviews(currentPOI);
            initStars();
        }
        
        // Attach event listeners
        const submitBtn = document.getElementById('submitReviewBtn');
        if (submitBtn) submitBtn.addEventListener('click', saveReview);
        
        const backBtn = document.getElementById('backHomeBtn');
        if (backBtn) backBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // Start
        init();
    </script>
</body>
</html>
