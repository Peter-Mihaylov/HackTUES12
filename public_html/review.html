<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Route Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #f8fafc;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --border-color: #e2e8f0;
            --input-bg: white;
            --button-bg: #eef2ff;
        }

        body.dark {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #1e293b;
            --button-bg: #334155;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 40px 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-toggle {
            background: var(--button-bg);
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .btn-home {
            background: var(--button-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .btn-home:hover, .theme-toggle:hover { background: #2c7da0; color: white; }
        .poi-info {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .poi-name { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .poi-type { display: inline-block; background: var(--button-bg); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: #2c7da0; margin-bottom: 12px; }
        .poi-description { color: var(--text-secondary); line-height: 1.5; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .poi-rating { color: #fbbf24; font-size: 1rem; margin-top: 8px; }
        .review-section {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .review-section h3 { font-size: 1.2rem; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .review-form { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .review-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .rating-select, .price-select { display: flex; gap: 8px; margin: 12px 0; }
        .rating-star { font-size: 1.8rem; cursor: pointer; color: #d1d5db; transition: 0.1s; }
        .rating-star.selected { color: #fbbf24; }
        .price-dollar { font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 20px; background: var(--button-bg); color: var(--text-muted); transition: 0.1s; font-weight: 600; }
        .price-dollar.selected { background: #2c7da0; color: white; }
        .submit-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .submit-btn:hover:not(:disabled) { background: #1f5e7c; transform: translateY(-2px); }
        .submit-btn.disabled, .submit-btn:disabled {
            background: #dc2626;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .reviews-list { margin-top: 20px; }
        .review-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .review-author { font-weight: 600; color: var(--text-primary); }
        .review-rating { color: #fbbf24; font-size: 0.8rem; }
        .review-price { font-size: 0.7rem; background: var(--button-bg); padding: 2px 8px; border-radius: 20px; }
        .review-date { font-size: 0.7rem; color: var(--text-muted); }
        .review-text { color: var(--text-secondary); line-height: 1.4; margin-top: 8px; }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .empty-reviews { text-align: center; padding: 40px; color: var(--text-muted); }
        .already-reviewed-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        body.dark .already-reviewed-badge { background: #422800; color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="btn-home" id="backHomeBtn"><i class="fas fa-home"></i> Back to Map</button>
            <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
        </div>

        <div id="poiInfo" class="poi-info">
            <div class="poi-name" id="poiName">Loading...</div>
            <span class="poi-type" id="poiType"></span>
            <div class="poi-rating" id="poiRating"></div>
            <div class="poi-description" id="poiDescription"></div>
        </div>

        <div class="review-section" id="reviewSection">
            <h3><i class="fas fa-pen"></i> Write a Review</h3>
            <div id="alreadyReviewedWarning" class="already-reviewed-badge" style="display: none;">
                <i class="fas fa-info-circle"></i> You've already reviewed this place
            </div>
            <div class="review-form" id="reviewForm">
                <textarea id="reviewText" placeholder="Share your experience at this place..."></textarea>
                <div class="rating-select" id="ratingSelect">
                    <span class="rating-star" data-value="1">★</span>
                    <span class="rating-star" data-value="2">★</span>
                    <span class="rating-star" data-value="3">★</span>
                    <span class="rating-star" data-value="4">★</span>
                    <span class="rating-star" data-value="5">★</span>
                </div>
                <div class="price-select" id="priceSelect">
                    <span class="price-dollar" data-value="1">$</span>
                    <span class="price-dollar" data-value="2">$$</span>
                    <span class="price-dollar" data-value="3">$$$</span>
                </div>
                <button class="submit-btn" id="submitReviewBtn"><i class="fas fa-check"></i> Post Review</button>
            </div>
        </div>

        <div class="review-section">
            <h3><i class="fas fa-comments"></i> All Reviews</h3>
            <div id="reviewsList" class="reviews-list"></div>
        </div>
    </div>

    <script type="module">
        import { getPOIById, addReviewToPOI, loadPOIData, hasUserReviewed } from './reviewsData.js';

        const urlParams = new URLSearchParams(window.location.search);
        const poiId = urlParams.get('id');
        
        let currentPOI = null;
        let selectedRating = 0;
        let selectedPrice = 0;
        let userHasReviewed = false;

        loadPOIData();
        
        // Dark Mode - sync with main page
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        initTheme();
        document.getElementById('themeToggle').addEventListener('click', toggleTheme);

        function setupRatingStars() {
            const stars = document.querySelectorAll('.rating-star');
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    if (userHasReviewed) return;
                    selectedRating = parseInt(star.dataset.value);
                    stars.forEach(s => {
                        const val = parseInt(s.dataset.value);
                        if (val <= selectedRating) s.classList.add('selected');
                        else s.classList.remove('selected');
                    });
                });
            });
        }
        
        function setupPriceSelect() {
            const prices = document.querySelectorAll('.price-dollar');
            prices.forEach(price => {
                price.addEventListener('click', () => {
                    if (userHasReviewed) return;
                    selectedPrice = parseInt(price.dataset.value);
                    prices.forEach(p => {
                        const val = parseInt(p.dataset.value);
                        if (val <= selectedPrice) p.classList.add('selected');
                        else p.classList.remove('selected');
                    });
                });
            });
        }

        function displayPOIInfo(poi) {
            document.getElementById('poiName').textContent = poi.name;
            document.getElementById('poiType').textContent = poi.type.charAt(0).toUpperCase() + poi.type.slice(1);
            
            const rating = poi.rating || 0;
            const starsDisplay = rating > 0 ? '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating)) : 'No ratings yet';
            document.getElementById('poiRating').innerHTML = `<i class="fas fa-star"></i> ${rating.toFixed(1) || '—'} (${starsDisplay})`;
            
            if (poi.description) {
                document.getElementById('poiDescription').innerHTML = `<i class="fas fa-info-circle"></i> ${escapeHtml(poi.description)}`;
            } else {
                document.getElementById('poiDescription').innerHTML = '<i class="fas fa-info-circle"></i> No description provided.';
            }
        }

        function displayReviews(poi) {
            const reviewsList = document.getElementById('reviewsList');
            
            if (!poi.reviews || poi.reviews.length === 0) {
                reviewsList.innerHTML = '<div class="empty-reviews"><i class="fas fa-comment-slash"></i><br>No reviews yet. Be the first to review!</div>';
                return;
            }
            
            reviewsList.innerHTML = '';
            poi.reviews.slice().reverse().forEach(review => {
                const reviewCard = document.createElement('div');
                reviewCard.className = 'review-card';
                const starsDisplay = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                const priceDisplay = review.price ? '$'.repeat(review.price) : '';
                reviewCard.innerHTML = `
                    <div class="review-header">
                        <span class="review-author"><i class="fas fa-user"></i> ${escapeHtml(review.author)}</span>
                        <span class="review-rating">${starsDisplay}</span>
                        ${priceDisplay ? `<span class="review-price">${priceDisplay}</span>` : ''}
                        <span class="review-date">${review.date}</span>
                    </div>
                    <div class="review-text">${escapeHtml(review.text)}</div>
                `;
                reviewsList.appendChild(reviewCard);
            });
        }

        function checkIfUserReviewed(poi) {
            userHasReviewed = hasUserReviewed(poi.id);
            
            const warningDiv = document.getElementById('alreadyReviewedWarning');
            const reviewForm = document.getElementById('reviewForm');
            const submitBtn = document.getElementById('submitReviewBtn');
            const textarea = document.getElementById('reviewText');
            const stars = document.querySelectorAll('.rating-star');
            const prices = document.querySelectorAll('.price-dollar');
            
            if (userHasReviewed) {
                warningDiv.style.display = 'flex';
                textarea.disabled = true;
                textarea.placeholder = "You've already reviewed this place. Thank you!";
                stars.forEach(star => {
                    star.style.cursor = 'not-allowed';
                    star.style.opacity = '0.5';
                });
                prices.forEach(price => {
                    price.style.cursor = 'not-allowed';
                    price.style.opacity = '0.5';
                });
                submitBtn.disabled = true;
                submitBtn.classList.add('disabled');
                submitBtn.innerHTML = '<i class="fas fa-ban"></i> Disabled - Already Reviewed';
            } else {
                warningDiv.style.display = 'none';
                textarea.disabled = false;
                stars.forEach(star => {
                    star.style.cursor = 'pointer';
                    star.style.opacity = '1';
                });
                prices.forEach(price => {
                    price.style.cursor = 'pointer';
                    price.style.opacity = '1';
                });
                submitBtn.disabled = false;
                submitBtn.classList.remove('disabled');
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Post Review';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showMessage(text, type) {
            const container = document.querySelector('.container');
            const existingMsg = document.querySelector('.message');
            if (existingMsg) existingMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            let icon = '';
            if (type === 'success') icon = '<i class="fas fa-check-circle"></i>';
            if (type === 'error') icon = '<i class="fas fa-exclamation-triangle"></i>';
            msgDiv.innerHTML = `${icon} ${text}`;
            container.insertBefore(msgDiv, container.firstChild);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        function saveReviewAndReturn() {
            if (userHasReviewed) {
                showMessage('You have already reviewed this place!', 'error');
                return false;
            }
            
            const reviewText = document.getElementById('reviewText').value.trim();
            
            if (!reviewText) {
                showMessage('Please write a review before submitting!', 'error');
                return false;
            }
            
            if (selectedRating === 0) {
                showMessage('Please select a rating (1-5 stars)!', 'error');
                return false;
            }
            
            const success = addReviewToPOI(poiId, {
                text: reviewText,
                rating: selectedRating,
                price: selectedPrice,
                author: 'Traveler'
            });
            
            if (success) {
                showMessage('Review posted successfully!', 'success');
                document.getElementById('reviewText').value = '';
                selectedRating = 0;
                selectedPrice = 0;
                const stars = document.querySelectorAll('.rating-star');
                stars.forEach(s => s.classList.remove('selected'));
                const prices = document.querySelectorAll('.price-dollar');
                prices.forEach(p => p.classList.remove('selected'));
                
                currentPOI = getPOIById(poiId);
                if (currentPOI) {
                    displayReviews(currentPOI);
                    displayPOIInfo(currentPOI);
                    checkIfUserReviewed(currentPOI);
                }
                return true;
            } else {
                showMessage('Failed to post review. Please try again.', 'error');
                return false;
            }
        }

        function init() {
            if (!poiId) {
                document.getElementById('poiName').textContent = 'Error: No POI selected';
                document.getElementById('poiType').textContent = 'Please go back and try again';
                return;
            }
            
            currentPOI = getPOIById(poiId);
            
            if (!currentPOI) {
                document.getElementById('poiName').textContent = 'POI not found';
                document.getElementById('poiType').textContent = 'This point may have been deleted';
                return;
            }
            
            displayPOIInfo(currentPOI);
            displayReviews(currentPOI);
            checkIfUserReviewed(currentPOI);
            setupRatingStars();
            setupPriceSelect();
        }

        document.getElementById('submitReviewBtn').addEventListener('click', saveReviewAndReturn);
        document.getElementById('backHomeBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        init();
    </script>
</body>
</html>
