<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Route Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: flex-start; margin-bottom: 30px; }
        .poi-info {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .poi-name { font-size: 1.8rem; font-weight: 700; color: #111827; margin-bottom: 8px; }
        .poi-type { display: inline-block; background: #eef2ff; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: #2c7da0; margin-bottom: 12px; }
        .poi-description { color: #4b5563; line-height: 1.5; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e2e8f0; }
        .poi-rating { color: #fbbf24; font-size: 1rem; margin-top: 8px; }
        .review-section {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #e2e8f0;
        }
        .review-section h3 { font-size: 1.2rem; color: #111827; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .review-form { background: #f8fafc; border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .review-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
        }
        .review-form textarea:focus { border-color: #2c7da0; box-shadow: 0 0 0 3px rgba(44,125,160,0.1); }
        .rating-select { display: flex; gap: 8px; margin: 12px 0; }
        .rating-star { font-size: 1.8rem; cursor: pointer; color: #d1d5db; transition: 0.1s; }
        .rating-star.selected { color: #fbbf24; }
        .submit-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .submit-btn:hover:not(:disabled) { background: #1f5e7c; transform: translateY(-2px); }
        .submit-btn.disabled, .submit-btn:disabled {
            background: #dc2626;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .reviews-list { margin-top: 20px; }
        .review-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .review-author { font-weight: 600; color: #111827; }
        .review-rating { color: #fbbf24; font-size: 0.8rem; }
        .review-date { font-size: 0.7rem; color: #9ca3af; }
        .review-text { color: #4b5563; line-height: 1.4; margin-top: 8px; }
        .btn-home {
            background: #eef2ff;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-home:hover { background: #2c7da0; color: white; }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .message.warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .empty-reviews { text-align: center; padding: 40px; color: #9ca3af; }
        .already-reviewed-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="btn-home" id="backHomeBtn"><i class="fas fa-home"></i> Back to Map</button>
        </div>

        <div id="poiInfo" class="poi-info">
            <div class="poi-name" id="poiName">Loading...</div>
            <span class="poi-type" id="poiType"></span>
            <div class="poi-rating" id="poiRating"></div>
            <div class="poi-description" id="poiDescription"></div>
        </div>

        <div class="review-section" id="reviewSection">
            <h3><i class="fas fa-pen"></i> Write a Review</h3>
            <div id="alreadyReviewedWarning" class="already-reviewed-badge" style="display: none;">
                <i class="fas fa-info-circle"></i> You've already reviewed this place
            </div>
            <div class="review-form" id="reviewForm">
                <textarea id="reviewText" placeholder="Share your experience at this place..."></textarea>
                <div class="rating-select" id="ratingSelect">
                    <span class="rating-star" data-value="1">★</span>
                    <span class="rating-star" data-value="2">★</span>
                    <span class="rating-star" data-value="3">★</span>
                    <span class="rating-star" data-value="4">★</span>
                    <span class="rating-star" data-value="5">★</span>
                </div>
                <button class="submit-btn" id="submitReviewBtn"><i class="fas fa-check"></i> Post Review</button>
            </div>
        </div>

        <div class="review-section">
            <h3><i class="fas fa-comments"></i> All Reviews</h3>
            <div id="reviewsList" class="reviews-list"></div>
        </div>
    </div>

    <script type="module">
        import { getPOIById, addReviewToPOI, loadPOIData, hasUserReviewed } from './reviewsData.js';

        const urlParams = new URLSearchParams(window.location.search);
        const poiId = urlParams.get('id');
        
        let currentPOI = null;
        let selectedRating = 0;
        let userHasReviewed = false;

        loadPOIData();

        function setupRatingStars() {
            const stars = document.querySelectorAll('.rating-star');
            stars.forEach(star => {
                star.addEventListener('click', () => {
                    if (userHasReviewed) return;
                    selectedRating = parseInt(star.dataset.value);
                    stars.forEach(s => {
                        const val = parseInt(s.dataset.value);
                        if (val <= selectedRating) s.classList.add('selected');
                        else s.classList.remove('selected');
                    });
                });
            });
        }

        function displayPOIInfo(poi) {
            document.getElementById('poiName').textContent = poi.name;
            document.getElementById('poiType').textContent = poi.type.charAt(0).toUpperCase() + poi.type.slice(1);
            
            const rating = poi.rating || 0;
            const starsDisplay = rating > 0 ? '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating)) : 'No ratings yet';
            document.getElementById('poiRating').innerHTML = `<i class="fas fa-star"></i> ${rating.toFixed(1) || '—'} (${starsDisplay})`;
            
            if (poi.description) {
                document.getElementById('poiDescription').innerHTML = `<i class="fas fa-info-circle"></i> ${escapeHtml(poi.description)}`;
            } else {
                document.getElementById('poiDescription').innerHTML = '<i class="fas fa-info-circle"></i> No description provided.';
            }
        }

        function displayReviews(poi) {
            const reviewsList = document.getElementById('reviewsList');
            
            if (!poi.reviews || poi.reviews.length === 0) {
                reviewsList.innerHTML = '<div class="empty-reviews"><i class="fas fa-comment-slash"></i><br>No reviews yet. Be the first to review!</div>';
                return;
            }
            
            reviewsList.innerHTML = '';
            poi.reviews.slice().reverse().forEach(review => {
                const reviewCard = document.createElement('div');
                reviewCard.className = 'review-card';
                const starsDisplay = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                reviewCard.innerHTML = `
                    <div class="review-header">
                        <span class="review-author"><i class="fas fa-user"></i> ${escapeHtml(review.author)}</span>
                        <span class="review-rating">${starsDisplay}</span>
                        <span class="review-date">${review.date}</span>
                    </div>
                    <div class="review-text">${escapeHtml(review.text)}</div>
                `;
                reviewsList.appendChild(reviewCard);
            });
        }

        function checkIfUserReviewed(poi) {
            userHasReviewed = hasUserReviewed(poi.id);
            
            const warningDiv = document.getElementById('alreadyReviewedWarning');
            const reviewForm = document.getElementById('reviewForm');
            const submitBtn = document.getElementById('submitReviewBtn');
            const textarea = document.getElementById('reviewText');
            const stars = document.querySelectorAll('.rating-star');
            
            if (userHasReviewed) {
                warningDiv.style.display = 'flex';
                textarea.disabled = true;
                textarea.placeholder = "You've already reviewed this place. Thank you!";
                stars.forEach(star => {
                    star.style.cursor = 'not-allowed';
                    star.style.opacity = '0.5';
                });
                submitBtn.disabled = true;
                submitBtn.classList.add('disabled');
                submitBtn.innerHTML = '<i class="fas fa-ban"></i> Disabled - Already Reviewed';
            } else {
                warningDiv.style.display = 'none';
                textarea.disabled = false;
                stars.forEach(star => {
                    star.style.cursor = 'pointer';
                    star.style.opacity = '1';
                });
                submitBtn.disabled = false;
                submitBtn.classList.remove('disabled');
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Post Review';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showMessage(text, type) {
            const container = document.querySelector('.container');
            const existingMsg = document.querySelector('.message');
            if (existingMsg) existingMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            let icon = '';
            if (type === 'success') icon = '<i class="fas fa-check-circle"></i>';
            if (type === 'error') icon = '<i class="fas fa-exclamation-triangle"></i>';
            if (type === 'warning') icon = '<i class="fas fa-info-circle"></i>';
            msgDiv.innerHTML = `${icon} ${text}`;
            container.insertBefore(msgDiv, container.firstChild);
            
            setTimeout(() => msgDiv.remove(), 3000);
        }

        function saveReviewAndReturn() {
            if (userHasReviewed) {
                showMessage('❌ You have already reviewed this place!', 'error');
                return false;
            }
            
            const reviewText = document.getElementById('reviewText').value.trim();
            
            if (!reviewText) {
                showMessage('❌ Please write a review before submitting!', 'error');
                return false;
            }
            
            if (selectedRating === 0) {
                showMessage('❌ Please select a rating (1-5 stars)!', 'error');
                return false;
            }
            
            const success = addReviewToPOI(poiId, {
                text: reviewText,
                rating: selectedRating,
                author: 'Traveler'
            });
            
            if (success) {
                showMessage('✅ Review posted successfully!', 'success');
                document.getElementById('reviewText').value = '';
                selectedRating = 0;
                const stars = document.querySelectorAll('.rating-star');
                stars.forEach(s => s.classList.remove('selected'));
                
                currentPOI = getPOIById(poiId);
                if (currentPOI) {
                    displayReviews(currentPOI);
                    displayPOIInfo(currentPOI);
                    checkIfUserReviewed(currentPOI);
                }
                return true;
            } else {
                showMessage('❌ Failed to post review. Please try again.', 'error');
                return false;
            }
        }

        function init() {
            if (!poiId) {
                document.getElementById('poiName').textContent = 'Error: No POI selected';
                document.getElementById('poiType').textContent = 'Please go back and try again';
                return;
            }
            
            currentPOI = getPOIById(poiId);
            
            if (!currentPOI) {
                document.getElementById('poiName').textContent = 'POI not found';
                document.getElementById('poiType').textContent = 'This point may have been deleted';
                return;
            }
            
            displayPOIInfo(currentPOI);
            displayReviews(currentPOI);
            checkIfUserReviewed(currentPOI);
            setupRatingStars();
        }

        document.getElementById('submitReviewBtn').addEventListener('click', saveReviewAndReturn);
        document.getElementById('backHomeBtn').addEventListener('click', () => {
            window.location.href = 'task.html';
        });

        init();
    </script>
</body>
</html>
