<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - Route Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-card: #f8fafc;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --border-color: #e2e8f0;
            --input-bg: white;
            --button-bg: #eef2ff;
        }

        body.dark {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #1e293b;
            --button-bg: #334155;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 40px 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .theme-toggle {
            background: var(--button-bg);
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .btn-home {
            background: var(--button-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            color: var(--text-primary);
        }
        .btn-home:hover, .theme-toggle:hover { background: #2c7da0; color: white; }
        .poi-info {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .poi-name { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .poi-type { display: inline-block; background: var(--button-bg); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; color: #2c7da0; margin-bottom: 12px; }
        .poi-description { color: var(--text-secondary); line-height: 1.5; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .poi-rating { color: #fbbf24; font-size: 1rem; margin-top: 8px; }
        .review-section {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }
        .review-section h3 { font-size: 1.2rem; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .review-form { background: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .review-form textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 100px;
            outline: none;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .rating-select { 
            display: flex; 
            gap: 12px; 
            margin: 16px 0;
            justify-content: center;
        }
        .rating-star { 
            font-size: 2.5rem; 
            cursor: pointer; 
            color: #d1d5db; 
            transition: all 0.2s ease;
            display: inline-block;
        }
        .rating-star:hover { 
            transform: scale(1.15);
            color: #fbbf24;
        }
        .rating-star.selected { 
            color: #fbbf24 !important;
        }
        
        .submit-btn {
            background: #2c7da0;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
        }
        .submit-btn:hover:not(:disabled) { background: #1f5e7c; transform: translateY(-2px); }
        .submit-btn.disabled, .submit-btn:disabled {
            background: #dc2626;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .reviews-list { margin-top: 20px; }
        .review-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
        .review-author { font-weight: 600; color: var(--text-primary); }
        .review-rating { color: #fbbf24; font-size: 1rem; letter-spacing: 2px; }
        .review-date { font-size: 0.7rem; color: var(--text-muted); }
        .review-text { color: var(--text-secondary); line-height: 1.4; margin-top: 8px; }
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .empty-reviews { text-align: center; padding: 40px; color: var(--text-muted); }
        .already-reviewed-badge {
            background: #fef3c7;
            color: #92400e;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        body.dark .already-reviewed-badge { background: #422800; color: #fbbf24; }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="btn-home" id="backHomeBtn"><i class="fas fa-home"></i> Back to Map</button>
            <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
        </div>

        <div id="poiInfo" class="poi-info">
            <div class="poi-name" id="poiName">Loading...</div>
            <span class="poi-type" id="poiType"></span>
            <div class="poi-rating" id="poiRating"></div>
            <div class="poi-description" id="poiDescription"></div>
        </div>

        <div class="review-section" id="reviewSection">
            <h3><i class="fas fa-pen"></i> Write a Review</h3>
            <div id="alreadyReviewedWarning" class="already-reviewed-badge" style="display: none;">
                <i class="fas fa-info-circle"></i> You've already reviewed this place
            </div>
            <div class="review-form" id="reviewForm">
                <textarea id="reviewText" placeholder="Share your experience at this place..."></textarea>
                <div class="rating-select" id="ratingSelect">
                    <span class="rating-star" data-value="1">★</span>
                    <span class="rating-star" data-value="2">★</span>
                    <span class="rating-star" data-value="3">★</span>
                    <span class="rating-star" data-value="4">★</span>
                    <span class="rating-star" data-value="5">★</span>
                </div>
                <button class="submit-btn" id="submitReviewBtn"><i class="fas fa-check"></i> Post Review</button>
            </div>
        </div>

        <div class="review-section">
            <h3><i class="fas fa-comments"></i> All Reviews</h3>
            <div id="reviewsList" class="reviews-list"></div>
        </div>
    </div>

    <script>
        // SIMPLE STANDALONE SCRIPT - NO DEPENDENCIES
        // This makes the stars work even if backend fails
        
        let selectedRating = 0;
        let userHasReviewed = false;
        
        // Dark Mode
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        initTheme();
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
        
        // STAR SELECTION - WORKS!
        function initStars() {
            const stars = document.querySelectorAll('.rating-star');
            console.log('Setting up stars, found:', stars.length);
            
            stars.forEach(star => {
                star.onclick = function(e) {
                    e.preventDefault();
                    if (userHasReviewed) {
                        alert('You have already reviewed this place!');
                        return;
                    }
                    
                    const value = parseInt(this.getAttribute('data-value'));
                    selectedRating = value;
                    console.log('Star clicked! Rating selected:', selectedRating);
                    
                    // Update star colors
                    stars.forEach(s => {
                        const starValue = parseInt(s.getAttribute('data-value'));
                        if (starValue <= selectedRating) {
                            s.classList.add('selected');
                        } else {
                            s.classList.remove('selected');
                        }
                    });
                };
            });
        }
        
        // Get POI from localStorage or use demo data
        function getPOIFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const poiId = urlParams.get('id');
            
            // Try to get from localStorage (if saved from main page)
            const savedPOIs = localStorage.getItem('pois');
            if (savedPOIs && poiId) {
                const pois = JSON.parse(savedPOIs);
                const poi = pois.find(p => p.id == poiId);
                if (poi) return poi;
            }
            
            // Demo data for testing
            return {
                id: poiId || '1',
                name: 'Test Location',
                type: 'restaurant',
                rating: 0,
                description: 'This is a test location. Stars should work!',
                reviews: []
            };
        }
        
        function displayPOIInfo(poi) {
            document.getElementById('poiName').textContent = poi.name || 'Test Location';
            document.getElementById('poiType').textContent = poi.type || 'place';
            document.getElementById('poiRating').innerHTML = '<i class="fas fa-star"></i> No ratings yet';
            if (poi.description) {
                document.getElementById('poiDescription').innerHTML = `<i class="fas fa-info-circle"></i> ${poi.description}`;
            }
        }
        
        function displayReviews(poi) {
            const reviewsList = document.getElementById('reviewsList');
            if (!poi.reviews || poi.reviews.length === 0) {
                reviewsList.innerHTML = '<div class="empty-reviews"><i class="fas fa-comment-slash"></i><br>No reviews yet. Be the first to review!</div>';
                return;
            }
            
            reviewsList.innerHTML = '';
            poi.reviews.slice().reverse().forEach(review => {
                const starsDisplay = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                reviewsList.innerHTML += `
                    <div class="review-card">
                        <div class="review-header">
                            <span class="review-author"><i class="fas fa-user"></i> ${escapeHtml(review.author)}</span>
                            <span class="review-rating">${starsDisplay}</span>
                            <span class="review-date">${review.date}</span>
                        </div>
                        <div class="review-text">${escapeHtml(review.text)}</div>
                    </div>
                `;
            });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showMessage(text, type) {
            const container = document.querySelector('.container');
            const existingMsg = document.querySelector('.message');
            if (existingMsg) existingMsg.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `${type === 'success' ? '✓' : '⚠'} ${text}`;
            container.insertBefore(msgDiv, container.firstChild);
            setTimeout(() => msgDiv.remove(), 3000);
        }
        
        function saveReview() {
            if (userHasReviewed) {
                showMessage('You have already reviewed this place!', 'error');
                return;
            }
            
            const reviewText = document.getElementById('reviewText').value.trim();
            
            if (!reviewText) {
                showMessage('Please write a review before submitting!', 'error');
                return;
            }
            
            if (selectedRating === 0) {
                showMessage('Please select a rating (1-5 stars)!', 'error');
                return;
            }
            
            // Save to localStorage for demo
            const review = {
                text: reviewText,
                rating: selectedRating,
                author: 'Traveler',
                date: new Date().toLocaleDateString()
            };
            
            // Get existing reviews from localStorage
            let reviews = JSON.parse(localStorage.getItem('reviews_' + window.location.search) || '[]');
            reviews.push(review);
            localStorage.setItem('reviews_' + window.location.search, JSON.stringify(reviews));
            
            showMessage('Review posted successfully!', 'success');
            document.getElementById('reviewText').value = '';
            selectedRating = 0;
            
            // Reset stars
            const stars = document.querySelectorAll('.rating-star');
            stars.forEach(s => s.classList.remove('selected'));
            
            // Update display
            const poi = getPOIFromURL();
            poi.reviews = reviews;
            displayReviews(poi);
            
            userHasReviewed = true;
            const warningDiv = document.getElementById('alreadyReviewedWarning');
            if (warningDiv) warningDiv.style.display = 'flex';
        }
        
        // Initialize page
        function init() {
            const poi = getPOIFromURL();
            displayPOIInfo(poi);
            displayReviews(poi);
            initStars();
            
            // Check if already reviewed
            const existingReviews = JSON.parse(localStorage.getItem('reviews_' + window.location.search) || '[]');
            if (existingReviews.length > 0) {
                userHasReviewed = true;
                const warningDiv = document.getElementById('alreadyReviewedWarning');
                if (warningDiv) warningDiv.style.display = 'flex';
            }
        }
        
        // Attach event listeners
        const submitBtn = document.getElementById('submitReviewBtn');
        if (submitBtn) submitBtn.addEventListener('click', saveReview);
        
        const backBtn = document.getElementById('backHomeBtn');
        if (backBtn) backBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // Start
        init();
    </script>
</body>
</html>
