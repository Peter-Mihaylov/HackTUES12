services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hacktues12-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./database:/app/database
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/database"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: hacktues12-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  apache:
    image: httpd:2.4-alpine
    container_name: hacktues12-apache
    ports:
      - "8001:8001"
    volumes:
      - ./public_html:/usr/local/apache2/htdocs:ro
    command: >
      /bin/sh -c "sed -i 's/Listen 80/Listen 8001/' /usr/local/apache2/conf/httpd.conf
      && httpd-foreground"
    restart: unless-stopped

volumes:
  mysql_data: